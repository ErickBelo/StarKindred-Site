<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarKindred | Painel Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos específicos da área administrativa */
        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        
        .grid-admin {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .grid-admin {
                grid-template-columns: 1fr 1fr;
            }
        }

        .secao-admin {
            background: #0a192f;
            border: 1px solid rgba(0, 180, 216, 0.2);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .secao-admin h2 {
            font-family: 'Orbitron', sans-serif;
            color: #00b4d8;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(0, 180, 216, 0.1);
            padding-bottom: 10px;
        }

        /* Formulários */
        .form-sk {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .input-sk, .select-sk, .textarea-sk {
            background: #050b14;
            border: 1px solid rgba(0, 180, 216, 0.3);
            border-radius: 4px;
            padding: 10px;
            color: white;
            font-family: 'Roboto', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        .input-sk:focus, .select-sk:focus, .textarea-sk:focus {
            outline: none;
            border-color: #00b4d8;
            box-shadow: 0 0 5px rgba(0, 180, 216, 0.3);
        }

        .textarea-sk {
            resize: vertical;
            min-height: 80px;
        }

        .btn-enviar-sk {
            background: #00b4d8;
            color: white;
            border: none;
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-enviar-sk:hover {
            background: #0077b6;
        }

        /* Tabelas */
        .tabela-sk {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .tabela-sk th, .tabela-sk td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 180, 216, 0.1);
            font-size: 0.9rem;
        }

        .tabela-sk th {
            font-family: 'Orbitron', sans-serif;
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .btn-acao {
            padding: 5px 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 5px;
        }

        .btn-remover {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border: 1px solid rgba(255, 77, 77, 0.3);
            transition: all 0.2s;
        }

        .btn-remover:hover {
            background: #ff4d4d;
            color: white;
        }

        .btn-voltar {
            display: inline-block;
            margin-bottom: 20px;
            color: #00b4d8;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            transition: transform 0.2s;
        }

        .btn-voltar:hover {
            transform: translateX(-3px);
        }
    </style>

    <!-- FIREBASE COMPAT SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Trava de segurança avançada (Verifica o login e se a role_tipo atual é admin)
        const usuarioLogado = localStorage.getItem("sk_usuario");
        const tipoInicial = localStorage.getItem("sk_tipo_usuario");
        const tipoPromovido = localStorage.getItem(`sk_role_tipo_${usuarioLogado}`);

        if (localStorage.getItem("sk_autenticado") !== "true" || (tipoInicial !== "admin" && tipoPromovido !== "admin")) {
            window.location.href = "login.html";
        }

        // Credenciais do Banco
        const firebaseConfig = {
            apiKey: "AIzaSyDqJZgfNSK281-eMJEucA5KOH00rg4HuEU",
            authDomain: "starkindred-51af3.firebaseapp.com",
            projectId: "starkindred-51af3",
            storageBucket: "starkindred-51af3.appspot.com",
            messagingSenderId: "83330470650",
            appId: "1:83330470650:web:162ac3be5b8c24866c7143",
            measurementId: "G-FFE53C599V"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body>

    <div class="admin-container">
        <a href="painel.html" class="btn-voltar">⬅️ Voltar ao QG dos Membros</a>
        
        <h1 style="font-family:'Orbitron'; color: white; margin-bottom: 30px;">Painel de Comando Staff</h1>

        <div class="grid-admin">
            
            <!-- FORMULÁRIO: TUTORIAIS -->
            <section class="secao-admin">
                <h2>📖 Publicar na Biblioteca</h2>
                <form id="form-tutorial" class="form-sk">
                    <div class="form-group">
                        <label>Título do Guia</label>
                        <input type="text" id="tut-titulo" class="input-sk" placeholder="Ex: Guia de Posicionamento - Retake A" required>
                    </div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <select id="tut-categoria" class="select-sk">
                            <option value="Guia Tático">Guia Tático</option>
                            <option value="Mecânica">Mecânica</option>
                            <option value="Lineups">Lineups</option>
                            <option value="Análise">Análise</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Descrição Breve</label>
                        <textarea id="tut-desc" class="textarea-sk" placeholder="Explique brevemente o que será aprendido..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Link do Vídeo (YouTube)</label>
                        <input type="url" id="tut-video" class="input-sk" placeholder="https://www.youtube.com/watch?v=...">
                    </div>
                    <button type="submit" class="btn-enviar-sk">Lançar Tutorial</button>
                </form>
            </section>

            <!-- FORMULÁRIO: EVENTOS -->
            <section class="secao-admin">
                <h2>📅 Agendar no Cronograma</h2>
                <form id="form-evento" class="form-sk">
                    <div class="form-group">
                        <label>Nome da Operação / Evento</label>
                        <input type="text" id="evt-nome" class="input-sk" placeholder="Ex: Treino Interno Geral" required>
                    </div>
                    <div class="form-group">
                        <label>Data e Horário</label>
                        <input type="text" id="evt-data" class="input-sk" placeholder="Ex: Sábado às 20:00h" required>
                    </div>
                    <div class="form-group">
                        <label>Local / Sala</label>
                        <input type="text" id="evt-local" class="input-sk" placeholder="Ex: Discord (Calha Tática)" required>
                    </div>
                    <button type="submit" class="btn-enviar-sk">Fixar Calendário</button>
                </form>
            </section>

            <!-- FORMULÁRIO: AULÕES -->
            <section class="secao-admin">
                <h2>⚔️ Convocar Aulão Oficial</h2>
                <form id="form-aulao" class="form-sk">
                    <div class="form-group">
                        <label>Tema da Aula</label>
                        <input type="text" id="aula-titulo" class="input-sk" placeholder="Ex: Leitura de Mapa Avançada" required>
                    </div>
                    <div class="form-group">
                        <label>Instrutor / Convidado</label>
                        <input type="text" id="aula-instrutor" class="input-sk" placeholder="Ex: Coach Breki" required>
                    </div>
                    <div class="form-group">
                        <label>Canal ou Link da Sala</label>
                        <input type="text" id="aula-local" class="input-sk" placeholder="Ex: Discord - Sala de Aula 1" required>
                    </div>
                    <button type="submit" class="btn-enviar-sk">Disparar Convocação</button>
                </form>
            </section>

            <!-- GERENCIAMENTO DE MEMBROS -->
            <section class="secao-admin">
                <h2>👥 Gerenciamento de Membros</h2>
                <div style="overflow-x: auto;">
                    <table class="tabela-sk">
                        <thead>
                            <tr>
                                <th>Nick</th>
                                <th>Função Atual</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-membros-admin">
                            <!-- Injetado dinamicamente via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </div>

    <script>
        // ==================== ENVIO DOS FORMULÁRIOS PARA O FIREBASE ====================

        // 1. Enviar Tutorial
        document.getElementById("form-tutorial").addEventListener("submit", async (e) => {
            e.preventDefault();
            const botao = e.target.querySelector('button');
            botao.textContent = "Publicando...";
            botao.disabled = true;

            try {
                await db.collection("tutoriais").add({
                    titulo: document.getElementById("tut-titulo").value,
                    categoria: document.getElementById("tut-categoria").value,
                    desc: document.getElementById("tut-desc").value,
                    video: document.getElementById("tut-video").value,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("✨ Tutorial lançado na Biblioteca em tempo real!");
                e.target.reset();
            } catch (err) {
                alert("Erro ao enviar para o Firebase: " + err.message);
            } finally {
                botao.textContent = "Lançar Tutorial";
                botao.disabled = false;
            }
        });

        // 2. Enviar Evento
        document.getElementById("form-evento").addEventListener("submit", async (e) => {
            e.preventDefault();
            const botao = e.target.querySelector('button');
            botao.textContent = "Agendando...";
            botao.disabled = true;

            try {
                await db.collection("eventos").add({
                    nome: document.getElementById("evt-nome").value,
                    data: document.getElementById("evt-data").value,
                    local: document.getElementById("evt-local").value,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("📅 Operação fixada no Cronograma dos membros!");
                e.target.reset();
            } catch (err) {
                alert("Erro ao salvar evento: " + err.message);
            } finally {
                botao.textContent = "Fixar Calendário";
                botao.disabled = false;
            }
        });

        // 3. Enviar Aulão
        document.getElementById("form-aulao").addEventListener("submit", async (e) => {
            e.preventDefault();
            const botao = e.target.querySelector('button');
            botao.textContent = "Convocando...";
            botao.disabled = true;

            try {
                await db.collection("aulaoes").add({
                    titulo: document.getElementById("aula-titulo").value,
                    convidado: document.getElementById("aula-instrutor").value,
                    local: document.getElementById("aula-local").value,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("⚔️ Convocação enviada com sucesso para o mural!");
                e.target.reset();
            } catch (err) {
                alert("Erro ao agendar aulão: " + err.message);
            } finally {
                botao.textContent = "Disparar Convocação";
                botao.disabled = false;
            }
        });

        // ==================== GERENCIAMENTO DE MEMBROS AVANÇADO ====================
        function carregarMembrosAdmin() {
            const tbody = document.getElementById("lista-membros-admin");
            
            tbody.innerHTML = `
                <tr>
                    <td style="color: white; font-weight: bold;">.Breki</td>
                    <td style="color: #d4af37; font-family: 'Orbitron'; font-size: 0.85rem; font-weight: bold;">👑 Líder Supremo</td>
                    <td><span style="color: #566573; font-size: 0.8rem; font-style: italic;">Membro Imutável</span></td>
                </tr>
            `;

            for (let i = 0; i < localStorage.length; i++) {
                let chave = localStorage.key(i);
                
                if (chave.startsWith("sk_user_")) {
                    let nick = chave.replace("sk_user_", "");
                    if(nick.toLowerCase() === "admin") continue; 

                    let dadosUsuario = JSON.parse(localStorage.getItem(chave)) || {};
                    let funcaoAtual = localStorage.getItem(`sk_role_${nick}`) || "membro";

                    let textoFuncao = funcaoAtual === "admin" ? "Staff / Admin" : funcaoAtual.charAt(0).toUpperCase() + funcaoAtual.slice(1);

                    let tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td style="color: #e2e8f0; font-weight: bold;">${nick}</td>
                        <td style="color: #00b4d8; font-family: 'Orbitron'; font-size: 0.85rem;" id="role-text-${nick}">${textoFuncao}</td>
                        <td>
                            <select class="select-sk" style="width: auto; margin-bottom: 0; padding: 5px 10px; font-size: 0.8rem;" onchange="alterarFuncaoMembro('${nick}', this.value)">
                                <option value="membro" ${funcaoAtual === "membro" ? "selected" : ""}>Membro</option>
                                <option value="sub-lider" ${funcaoAtual === "sub-lider" ? "selected" : ""}>Sub-Líder</option>
                                <option value="coach" ${funcaoAtual === "coach" ? "selected" : ""}>Coach / Instrutor</option>
                                <option value="admin" ${funcaoAtual === "admin" ? "selected" : ""}>Staff / Admin</option>
                            </select>
                            <button class="btn-acao btn-remover" onclick="banirMembro('${nick}')">Banir</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            }
        }

        function alterarFuncaoMembro(nick, novaFuncao) {
            localStorage.setItem(`sk_role_${nick}`, novaFuncao);
            
            if(novaFuncao === "admin") {
                localStorage.setItem(`sk_role_tipo_${nick}`, "admin"); 
            } else {
                localStorage.setItem(`sk_role_tipo_${nick}`, "membro");
            }

            let textoFormatado = novaFuncao === "admin" ? "Staff / Admin" : novaFuncao.charAt(0).toUpperCase() + novaFuncao.slice(1);
            document.getElementById(`role-text-${nick}`).textContent = textoFormatado;
            
            alert(`🔥 A função de ${nick} foi atualizada para: ${textoFormatado}!`);
        }

        function banirMembro(nick) {
            if(confirm(`🚨 ATENÇÃO: Tem certeza que deseja BANIR e remover o jogador ${nick} do sistema?`)) {
                localStorage.removeItem(`sk_user_${nick}`);
                localStorage.removeItem(`sk_avatar_${nick}`);
                localStorage.removeItem(`sk_role_${nick}`);
                localStorage.removeItem(`sk_role_tipo_${nick}`);
                alert(`Jogador ${nick} foi extinto da base de dados.`);
                carregarMembrosAdmin();
            }
        }

        // Executa ao abrir a página
        carregarMembrosAdmin();
    </script>
</body>
</html>
