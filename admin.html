<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarKindred | QG Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050b14;
            color: #e2e8f0;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 40px;
        }
        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            background: #0a192f;
            border: 2px solid #ff4d4d;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.1);
        }
        h1, h2 {
            font-family: 'Orbitron', sans-serif;
            color: #ff4d4d;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
        }
        p { color: #94a3b8; margin-bottom: 30px; }
        
        .secao-admin {
            background: rgba(5, 11, 20, 0.6);
            border: 1px solid rgba(255, 77, 77, 0.2);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .secao-admin h3 {
            font-family: 'Orbitron', sans-serif;
            color: #e2e8f0;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 77, 77, 0.2);
            padding-bottom: 10px;
        }
        
        label {
            display: block;
            color: #d4af37;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }
        .input-sk, .select-sk, .textarea-sk {
            width: 100%;
            padding: 12px;
            background: #050b14;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 4px;
            color: white;
            font-family: 'Roboto', sans-serif;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .input-sk:focus, .select-sk:focus, .textarea-sk:focus {
            outline: none;
            border-color: #ff4d4d;
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.2);
        }
        
        .btn-enviar {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff4d4d 0%, #cc1111 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.2);
        }
        .btn-enviar:hover {
            transform: scale(1.01);
            box-shadow: 0 0 15px #ff4d4d;
        }
        .btn-voltar {
            display: inline-block;
            color: #00b4d8;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .btn-voltar:hover { text-decoration: underline; }
    </style>

    <!-- CARREGANDO O FIREBASE VIA CDN (NAVEGADOR) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Trava simples de segurança local por enquanto
        if (localStorage.getItem("sk_autenticado") !== "true" || localStorage.getItem("sk_tipo_usuario") !== "admin") {
            window.location.href = "login.html";
        }

        // Suas credenciais reais do Firebase configuradas
        const firebaseConfig = {
            apiKey: "AIzaSyDqJZgfNSK281-eMJEucA5KOH00rg4HuEU",
            authDomain: "starkindred-51af3.firebaseapp.com",
            projectId: "starkindred-51af3",
            storageBucket: "starkindred-51af3.appspot.com",
            messagingSenderId: "83330470650",
            appId: "1:83330470650:web:162ac3be5b8c24866c7143",
            measurementId: "G-FFE53C599V"
        };

        // Inicializando o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body>

    <div class="admin-container">
        <a href="painel.html" class="btn-voltar">← Ir para o Painel dos Membros</a>
        <h1>Painel de Controle Staff</h1>
        <p>Publique conteúdos oficiais na base de dados em nuvem da StarKindred.</p>

        <!-- FORMULÁRIO DE TUTORIAIS -->
        <div class="secao-admin">
            <h3>📖 Publicar Novo Guia / Tutorial</h3>
            <form id="form-tutoriais">
                <label>Categoria da Arma:</label>
                <input type="text" id="tut-cat" class="input-sk" placeholder="Ex: Foice / Scythe, Espada, Blasters" required>

                <label>Título do Tutorial:</label>
                <input type="text" id="tut-titulo" class="input-sk" placeholder="Ex: Strings de Leitura com Nix" required>

                <label>Descrição Curta / Instruções:</label>
                <textarea id="tut-desc" class="textarea-sk" rows="3" placeholder="Aprenda setups de active input e strings de leitura..." required></textarea>

                <button type="submit" class="btn-enviar">Lançar na Base de Dados</button>
            </form>
        </div>

        <!-- FORMULÁRIO DE EVENTOS -->
        <div class="secao-admin">
            <h3>📅 Agendar Operação / Campeonato</h3>
            <form id="form-eventos">
                <label>Tipo de Evento:</label>
                <input type="text" id="ev-tipo" class="input-sk" placeholder="Ex: Torneio 1v1, Treino de Clã, Frosty" required>

                <label>Nome do Evento:</label>
                <input type="text" id="ev-nome" class="input-sk" placeholder="Ex: King of Valhalla" required>

                <label>Data, Horário e Detalhes:</label>
                <input type="text" id="ev-detalhes" class="input-sk" placeholder="Ex: Próximo Domingo às 18:00h" required>

                <button type="submit" class="btn-enviar">Fixar no Calendário</button>
            </form>
        </div>

        <!-- FORMULÁRIO DE AULÕES -->
        <div class="secao-admin">
            <h3>⚔️ Marcar Aulão Especial</h3>
            <form id="form-aulaoes">
                <label>Foco / Tema do Aulão:</label>
                <input type="text" id="aula-tema" class="input-sk" placeholder="Ex: Análise de Replay & Posicionamento" required>

                <label>Nome do Instrutor (Professor):</label>
                <input type="text" id="aula-prof" class="input-sk" placeholder="Ex: .Breki" required>

                <label>Tipo de Aula:</label>
                <input type="text" id="aula-tipo" class="input-sk" placeholder="Ex: Teórica, Prática 2v2" required>

                <button type="submit" class="btn-enviar">Convocar Alunos</button>
            </form>
        </div>
    </div>

    <script>
        // LÓGICA DE ENVIO PARA O FIREBASE FIRESTORE

        // Enviar Tutorial
        document.getElementById("form-tutoriais").addEventListener("submit", function(e) {
            e.preventDefault();
            
            db.collection("tutoriais").add({
                tutCat: document.getElementById("tut-cat").value,
                tutTitulo: document.getElementById("tut-titulo").value,
                tutDesc: document.getElementById("tut-desc").value,
                dataCriacao: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert("Sucesso: Guia enviado para a nuvem!");
                document.getElementById("form-tutoriais").reset();
            })
            .catch((error) => console.error("Erro ao salvar tutorial: ", error));
        });

        // Enviar Evento
        document.getElementById("form-eventos").addEventListener("submit", function(e) {
            e.preventDefault();
            
            db.collection("eventos").add({
                evTipo: document.getElementById("ev-tipo").value,
                evNome: document.getElementById("ev-nome").value,
                evDetalhes: document.getElementById("ev-detalhes").value,
                dataCriacao: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert("Sucesso: Evento agendado na nuvem!");
                document.getElementById("form-eventos").reset();
            })
            .catch((error) => console.error("Erro ao salvar evento: ", error));
        });

        // Enviar Aulão
        document.getElementById("form-aulaoes").addEventListener("submit", function(e) {
            e.preventDefault();
            
            db.collection("aulaoes").add({
                aulaTema: document.getElementById("aula-tema").value,
                aulaProf: document.getElementById("aula-prof").value,
                aulaTipo: document.getElementById("aula-tipo").value,
                dataCriacao: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert("Sucesso: Aulão publicado na nuvem!");
                document.getElementById("form-aulaoes").reset();
            })
            .catch((error) => console.error("Erro ao salvar aulão: ", error));
        });
    </script>
</body>
</html>
