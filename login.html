<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarKindred | Login de Pilotos</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           PALETA DE CORES TÁTICA & CONFIGURAÇÕES BASE
           ========================================================================== */
        :root {
            --bg-principal: #030914;      /* Azul espacial profundo */
            --bg-card: rgba(8, 18, 37, 0.85); /* Azul escuro semi-transparente */
            --amarelo: #ffb703;           /* Amarelo vibrante */
            --dourado: #d4af37;           /* Dourado de destaque */
            --azul-brilho: #00b4d8;       /* Azul ciano ativo */
            --texto-claro: #ffffff;
            --texto-mutado: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Camada Estelar */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.3;
        }

        /* Card de Login */
        .login-container {
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .login-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--amarelo);
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(255, 183, 3, 0.3);
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--texto-mutated);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Inputs e Formulário */
        .input-grupo {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-grupo label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--dourado);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-campo {
            width: 100%;
            background: rgba(3, 9, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 12px 15px;
            color: var(--texto-claro);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-campo:focus {
            outline: none;
            border-color: var(--amarelo);
            box-shadow: 0 0 10px rgba(255, 183, 3, 0.2);
        }

        /* Botão de Ignição */
        .btn-submeter {
            width: 100%;
            font-family: 'Orbitron', sans-serif;
            background: var(--amarelo);
            color: var(--bg-principal);
            border: none;
            border-radius: 4px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .btn-submeter:hover {
            background: var(--dourado);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transform: translateY(-1px);
        }

        /* Link de retorno */
        .link-retorno {
            display: inline-block;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--texto-mutado);
            text-decoration: none;
            transition: color 0.3s;
        }

        .link-retorno:hover {
            color: var(--amarelo);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">StarKindred</div>
        <div class="login-subtitle">Acesso de Oficiais</div>

        <!-- O onsubmit impede que o formulário quebre e força o script JavaScript -->
        <form onsubmit="manipularLogin(event)">
            
            <!-- Entrada de Usuário -->
            <div class="input-grupo">
                <label for="usuario">IDENTIFICAÇÃO DO PILOTO</label>
                <input type="text" id="usuario" class="input-campo" placeholder="Ex: .Breki" required autocomplete="off">
            </div>

            <!-- Entrada de Senha -->
            <div class="input-grupo">
                <label for="senha">CÓDIGO DE ACESSO</label>
                <input type="password" id="senha" class="input-campo" placeholder="••••••••" required>
            </div>

            <!-- Botão de Envio -->
            <button type="submit" class="btn-submeter">Iniciar Ignição</button>
        </form>

        <a href="index.html" class="link-retorno">← Abortar Missão (Voltar para a Home)</a>
    </div>

    <!-- Script de Autenticação Tática -->
    <script>
        function manipularLogin(event) {
            // 1. Evita que o navegador recarregue a página ou envie os dados para um servidor inexistente
            event.preventDefault(); 
            
            // 2. Resgata e limpa o valor digitado no input
            const usuarioInput = document.getElementById("usuario").value.trim();

            if (usuarioInput === "") {
                alert("Por favor, digite um codinome de piloto!");
                return;
            }

            // 3. Salva temporariamente no navegador o nome digitado
            localStorage.setItem("sk_usuario", usuarioInput);
            
            alert(`Sistemas de bordo iniciados! Bem-vindo, Comandante ${usuarioInput}.`);
            
            // 4. Força o redirecionamento direto para a página do painel
            window.location.href = "painel.html";
        }
    </script>
</body>
</html>
