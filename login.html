<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarKindred | Login & Alistamento</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           PALETA DE CORES TÁTICA
           ========================================================================== */
        :root {
            --bg-principal: #030914;      
            --bg-card: rgba(8, 18, 37, 0.85); 
            --amarelo: #ffb703;           
            --dourado: #d4af37;           
            --texto-claro: #ffffff;
            --texto-mutado: #94a3b8;
        }

        /* ==========================================================================
           ESTILOS GERAIS & FUNDO ESPACIAL
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            position: relative;
            padding: 40px 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.35;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: 
                radial-gradient(rgba(214, 175, 55, 0.4), rgba(214, 175, 55, 0.1) 2px, transparent 30px),
                radial-gradient(rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.1) 1.5px, transparent 20px);
            background-size: 400px 400px, 300px 300px;
            background-position: 80px 120px, 210px 50px;
            animation: cintilar 6s infinite alternate ease-in-out;
            opacity: 0.3;
        }

        @keyframes cintilar {
            0% { opacity: 0.15; }
            50% { opacity: 0.45; }
            100% { opacity: 0.2; }
        }

        /* ==========================================================================
           CARD DE LOGIN / ALISTAMENTO
           ========================================================================== */
        .login-container {
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            text-align: center;
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .login-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--amarelo);
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            text-shadow: 0 0 12px rgba(255, 183, 3, 0.3);
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--texto-mutado);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .input-grupo {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-grupo label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--dourado);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-campo {
            width: 100%;
            background: rgba(3, 9, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 12px 15px;
            color: var(--texto-claro);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-campo:focus {
            border-color: var(--amarelo);
            box-shadow: 0 0 10px rgba(255, 183, 3, 0.2);
        }

        .btn-submeter {
            width: 100%;
            font-family: 'Orbitron', sans-serif;
            background: var(--amarelo);
            color: var(--bg-principal);
            border: none;
            border-radius: 4px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .btn-submeter:hover {
            background: var(--dourado);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transform: translateY(-1px);
        }

        .escondido {
            display: none !important;
        }

        .links-alternar {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-acao {
            font-size: 0.85rem;
            color: var(--texto-mutado);
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
        }

        .link-acao:hover {
            color: var(--amarelo);
        }

        .link-retorno {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">StarKindred</div>
        
        <!-- ==========================================================================
             FORMULÁRIO DE LOGIN
             ========================================================================== -->
        <div id="secao-login">
            <div class="login-subtitle">Acesso de Pilotos</div>
            <form id="form-login">
                <div class="input-grupo">
                    <label for="usuario">IDENTIFICAÇÃO DO PILOTO (NICK)</label>
                    <input type="text" id="usuario" class="input-campo" placeholder="Ex: Breki" required autocomplete="off">
                </div>

                <div class="input-grupo">
                    <label for="senha">CÓDIGO DE ACESSO (SENHA)</label>
                    <input type="password" id="senha" class="input-campo" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submeter">Iniciar Ignição</button>
            </form>
        </div>

        <!-- ==========================================================================
             FORMULÁRIO DE ALISTAMENTO (CADASTRO REDUZIDO)
             ========================================================================== -->
        <div id="secao-alistamento" class="escondido">
            <div class="login-subtitle">Alistamento de Recrutas</div>
            <form id="form-alistamento">
                <div class="input-grupo">
                    <label for="cad-usuario">IDENTIFICAÇÃO DO PILOTO (NICK / LOGIN)</label>
                    <input type="text" id="cad-usuario" class="input-campo" placeholder="Ex: Breki" required autocomplete="off">
                </div>

                <div class="input-grupo">
                    <label for="cad-discord">USUÁRIO DO DISCORD</label>
                    <input type="text" id="cad-discord" class="input-campo" placeholder="Ex: breki_oficial" required autocomplete="off">
                </div>

                <div class="input-grupo">
                    <label for="cad-corehalla">LINK DO COREHALLA</label>
                    <input type="url" id="cad-corehalla" class="input-campo" placeholder="Ex: https://corehalla.com/stats/player/..." required autocomplete="off">
                </div>

                <div class="input-grupo">
                    <label for="cad-senha">CRIAR CÓDIGO DE ACESSO (SENHA)</label>
                    <input type="password" id="cad-senha" class="input-campo" placeholder="Crie uma senha de acesso" required>
                </div>

                <button type="submit" class="btn-submeter">Enviar Ficha Militar</button>
            </form>
        </div>

        <!-- Menu de Navegação Inferior -->
        <div class="links-alternar">
            <button id="btn-ir-alistamento" class="link-acao">🚀 Não tem login? Aliste-se na Frota!</button>
            <button id="btn-ir-login" class="link-acao escondido">🛸 Já é cadastrado? Voltar para o Login</button>
            <a href="index.html" class="link-acao link-retorno">← Abortar Missão (Voltar para a Home)</a>
        </div>
    </div>

    <!-- INTEGRACAO FIRESTORE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqJZgfNSK281-eMJEucA5KOH00rg4HuEU",
            authDomain: "starkindred-51af3.firebaseapp.com",
            projectId: "starkindred-51af3",
            storageBucket: "starkindred-51af3.firebasestorage.app",
            messagingSenderId: "833370470650",
            appId: "1:833370470650:web:162ac3be5b8c24866c7143",
            measurementId: "G-FFE53C599V"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const secaoLogin = document.getElementById("secao-login");
        const secaoAlistamento = document.getElementById("secao-alistamento");
        const btnIrAlistamento = document.getElementById("btn-ir-alistamento");
        const btnIrLogin = document.getElementById("btn-ir-login");

        btnIrAlistamento.addEventListener("click", () => {
            secaoLogin.classList.add("escondido");
            secaoAlistamento.classList.remove("escondido");
            btnIrAlistamento.classList.add("escondido");
            btnIrLogin.classList.remove("escondido");
        });

        btnIrLogin.addEventListener("click", () => {
            secaoAlistamento.classList.add("escondido");
            secaoLogin.classList.remove("escondido");
            btnIrLogin.classList.add("escondido");
            btnIrAlistamento.classList.remove("escondido");
        });

        // LOGIN
        const formLogin = document.getElementById("form-login");
        formLogin.addEventListener("submit", async function(event) {
            event.preventDefault(); 
            const nickDigitado = document.getElementById("usuario").value.trim();
            const senhaDigitada = document.getElementById("senha").value;

            try {
                const docRef = doc(db, "membros", nickDigitado);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const dadosPiloto = docSnap.data();
                    if (dadosPiloto.senha === senhaDigitada) {
                        localStorage.setItem("sk_usuario", dadosPiloto.nome);
                        localStorage.setItem("sk_patente", dadosPiloto.patente || "Membro");
                        alert(`Sistemas de bordo autorizados! Bem-vindo, Comandante ${dadosPiloto.nome}.`);
                        window.location.href = "painel.html"; 
                    } else {
                        alert("Código de acesso incorreto! Acesso negado.");
                    }
                } else {
                    alert("Piloto não localizado na base de dados oficial da guilda.");
                }
            } catch (error) {
                alert("Falha na comunicação cósmica com o banco de dados.");
            }
        });

        // ALISTAMENTO REDUZIDO
        const formAlistamento = document.getElementById("form-alistamento");
        formAlistamento.addEventListener("submit", async function(event) {
            event.preventDefault();

            const nickSolicitado = document.getElementById("cad-usuario").value.trim();
            const discord = document.getElementById("cad-discord").value.trim();
            const corehallaLink = document.getElementById("cad-corehalla").value.trim();
            const senhaDefinida = document.getElementById("cad-senha").value;

            try {
                const checarMembroDoc = await getDoc(doc(db, "membros", nickSolicitado));
                if (checarMembroDoc.exists()) {
                    alert("Este Nick já está ativo na frota oficial! Escolha outro.");
                    return;
                }

                // Salva apenas os dados novos solicitados
                await setDoc(doc(db, "solicitacoes", nickSolicitado), {
                    nome: nickSolicitado, // Definido como o próprio Nick para consistência no sistema
                    nick: nickSolicitado,
                    discord: discord,
                    corehalla: corehallaLink,
                    senha: senhaDefinida,
                    dataSolicitacao: new Date().toISOString()
                });

                alert("Sinal de alistamento enviado! Sua ficha agora está na fila de aprovação dos oficiais. Avise no Discord!");
                formAlistamento.reset();
                btnIrLogin.click();

            } catch (error) {
                alert("Houve um erro nos sistemas de transmissão da sua ficha. Tente novamente.");
            }
        });
    </script>
</body>
</html>
